<!DOCTYPE html>
<html>
<head>
    <title>Calculus & Algebra Study Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; text-align: center; padding-top: 50px; margin: 0; }
        .container { max-width: 800px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .math-btn { padding: 20px; background: #fff; border: 2px solid #1a73e8; color: #1a73e8; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; transition: 0.3s; }
        .math-btn:hover { background: #1a73e8; color: white; }
        
        /* The hidden game window */
        #game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        #close-btn { position: absolute; top: 10px; right: 20px; color: white; cursor: pointer; font-size: 24px; opacity: 0.1; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Semester 2 Study Dashboard</h1>
        <p>Select a module to begin your review sessions.</p>
        <div class="btn-grid">
            <div class="math-btn" onclick="startGame()">Module 1: Advanced Derivatives</div>
            <div class="math-btn">Module 2: Integral Calculus</div>
            <div class="math-btn">Module 3: Linear Algebra</div>
            <div class="math-btn">Practice Final Exam</div>
        </div>
    </div>

    <!-- This is the secret game layer -->
    <div id="game-overlay">
        <div id="close-btn" onclick="hideGame()">×</div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        function startGame() {
            // Using the working link from irv77 that already has all files uploaded
            document.getElementById('game-frame').src = "https://github.io";
            document.getElementById('game-overlay').style.display = 'block';
        }
        function hideGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = ""; // Stops game sound
        }
        // Press 'Esc' to instantly hide the game
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") hideGame();
        });
    </script>
</body>
</html>

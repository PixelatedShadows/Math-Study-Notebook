<!DOCTYPE html>
<html>
<head>
    <title>Math Study Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; text-align: center; padding-top: 50px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { display: block; width: 80%; margin: 15px auto; padding: 15px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; cursor: pointer; border: none; }
        .btn:hover { background: #0056b3; }
        #game-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Semester 2 Math Review</h1>
        <p>Click a module to begin your practice session.</p>
        <button class="btn" onclick="openGame()">Module 1: Advanced Derivatives</button>
        <button class="btn">Module 2: Integral Calculus</button>
    </div>

    <div id="game-layer">
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        function openGame() {
            // This pulls the game from a working link so you don't have to upload files
            document.getElementById('game-frame').src = "https://github.io";
            document.getElementById('game-layer').style.display = 'block';
        }
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") { // Tap ESC to hide the game instantly
                document.getElementById('game-layer').style.display = 'none';
                document.getElementById('game-frame').src = ""; 
            }
        });
    </script>
</body>
</html>

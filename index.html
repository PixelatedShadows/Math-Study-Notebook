<!DOCTYPE html>
<html>
<head>
    <title>Analytics Engine | Data Stream v4.0</title>
    <style>
        /* This makes it look like a boring coding site */
        body { font-family: 'Courier New', monospace; background: #121212; color: #4af626; margin: 0; padding: 40px; }
        .dashboard { border: 1px solid #333; padding: 20px; border-radius: 5px; background: #1a1a1a; max-width: 700px; margin: auto; }
        .log-entry { margin: 10px 0; font-size: 14px; }
        .status-ok { color: #2ecc71; }
        
        /* The Secret Button - Looks like a system command */
        .cmd-btn { 
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border: 1px solid #4af626;
            color: #4af626;
            cursor: pointer;
            text-decoration: none;
        }
        .cmd-btn:hover { background: #4af626; color: #121212; }

        /* The Launcher Layer */
        #launcher-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>CORE_SYSTEM_ANALYTICS</h2>
        <div class="log-entry">> Initializing network protocols... <span class="status-ok">[SUCCESS]</span></div>
        <div class="log-entry">> Fetching encrypted data packets... <span class="status-ok">[SUCCESS]</span></div>
        <div class="log-entry">> Awaiting user authentication... </div>
        
        <!-- This opens the Alternative Launcher -->
        <div class="cmd-btn" onclick="startLauncher()">RUN_SYSTEM_DIAGNOSTIC</div>
    </div>

    <div id="launcher-container">
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        function startLauncher() {
            // This is the link to the Alternative FNAF Launcher
            document.getElementById('game-frame').src = "https://github.io";
            document.getElementById('launcher-container').style.display = 'block';
        }

        // PANIC KEY: Press 'Escape' to hide everything instantly
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") {
                document.getElementById('launcher-container').style.display = 'none';
                document.getElementById('game-frame').src = ""; // Stops any music
            }
        });
    </script>
</body>
</html>

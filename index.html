<!DOCTYPE html>
<html>
<head>
    <title>Calculus Unit 4 | Study Guide</title>
    <style>
        body { font-family: sans-serif; background: #fdfdfd; text-align: center; padding-top: 80px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 40px; border: 1px solid #ddd; border-radius: 8px; }
        h1 { font-size: 24px; color: #2c3e50; }
        .btn { 
            display: block; 
            width: 100%; 
            margin: 15px 0; 
            padding: 15px; 
            background: #3498db; 
            color: white; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            border: none;
            font-size: 16px;
        }
        .btn:hover { background: #2980b9; }
        
        /* This hides the game until you click */
        #game-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Advanced Functions & Limits</h1>
        <p>Select a module to begin your practice session.</p>
        
        <!-- This button launches the Alternative Launcher -->
        <button class="btn" onclick="openGame()">Module 4.1: Polynomial Limits</button>
        
        <!-- These buttons do nothing (fake school work) -->
        <button class="btn">Module 4.2: Derivative Rules</button>
        <button class="btn">Practice Final Exam</button>
    </div>

    <div id="game-layer">
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        function openGame() {
            // This is the link to the Alternative FNAF Launcher
            document.getElementById('game-frame').src = "https://github.io";
            document.getElementById('game-layer').style.display = 'block';
        }

        // PANIC KEY: Press 'Escape' to hide the game instantly
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") {
                document.getElementById('game-layer').style.display = 'none';
                document.getElementById('game-frame').src = ""; 
            }
        });
    </script>

</body>
</html>
